# ─────────────────────────────────────────────────────────────────────────────
# nginx reverse proxy — Voice Pipeline API
#
# Sits in front of gunicorn (port 8000) and handles:
#   - TLS termination (configure ssl_certificate / ssl_certificate_key below)
#   - gzip compression
#   - request size enforcement (50 MB)
#   - rate limiting on the transcription endpoint
#   - proxy timeouts matched to gunicorn WORKER_TIMEOUT (180 s)
#   - X-Forwarded-For header forwarding (matches gunicorn forwarded_allow_ips)
#   - security headers
# ─────────────────────────────────────────────────────────────────────────────

# Rate-limit zones (defined in http context, so we use a sub-included snippet)
# Declare these in the main http block via the docker-compose nginx image.
# If using the official nginx image the default nginx.conf includes
# /etc/nginx/conf.d/*.conf, so this file is placed there directly.

# ── Rate limit: allow 5 transcription requests/sec per client IP ─────────────
limit_req_zone $binary_remote_addr zone=transcribe_zone:10m rate=5r/s;

# ── Upstream gunicorn ────────────────────────────────────────────────────────
upstream voice_pipeline {
    server voice-pipeline:8000;
    keepalive 32;          # persistent connections to gunicorn
}

# ── HTTP → HTTPS redirect (uncomment when TLS is configured) ─────────────────
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;   # uncomment for TLS
    server_name _;

    # ── TLS (uncomment and populate) ─────────────────────────────────────────
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ── Upload size: matches MAX_UPLOAD_SIZE_MB in config.py (default 50 MB) ─
    client_max_body_size 52m;

    # ── Timeouts: must exceed gunicorn WORKER_TIMEOUT (default 180 s) ────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    185s;
    proxy_read_timeout    185s;
    send_timeout          185s;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/html;
    gzip_min_length 512;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "DENY"             always;
    add_header X-XSS-Protection        "1; mode=block"    always;
    add_header Referrer-Policy         "no-referrer"      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Proxy headers ────────────────────────────────────────────────────────
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";     # keep-alive (HTTP/1.1)
    proxy_http_version 1.1;

    # ── /v1/transcribe – rate-limited ────────────────────────────────────────
    location /v1/transcribe {
        limit_req zone=transcribe_zone burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://voice_pipeline;
    }

    # ── Health / liveness probes (no rate limiting) ──────────────────────────
    location ~ ^/v1/(live|ready|health) {
        proxy_pass http://voice_pipeline;
        access_log off;    # suppress health-check noise in logs
    }

    # ── All other API routes ─────────────────────────────────────────────────
    location / {
        proxy_pass http://voice_pipeline;
    }
}
